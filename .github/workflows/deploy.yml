name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug secrets presence
        run: |
          if [ -z "${{ secrets.SERVER_HOST }}" ]; then echo "SERVER_HOST is empty"; exit 1; fi
          if [ -z "${{ secrets.SERVER_USER }}" ]; then echo "SERVER_USER is empty"; exit 1; fi
          if [ -z "${{ secrets.SERVER_SSH_KEY }}" ]; then echo "SERVER_SSH_KEY is empty"; exit 1; fi
          echo "All required secrets exist"

      - name: Deploy server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            cd /var/www/myproject/K-monitoring-dev
            git pull origin main
            docker compose up -d --build
            sudo systemctl reload nginx